name: Update README stats

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Generate language statistics
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=sbf-developer&layout=compact&langs_count=8&hide_border=true&theme=transparent
          path: profile/languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit statistics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update profile statistics" || exit 0
          git push
